services:

  # 1. The PostgreSQL Database Container
  postgres:
    # Use the official Postgres image from Docker Hub
    image: postgres:14-alpine
    container_name: de_postgres_db
    restart: always # Always try to restart if it fails
    environment:
      # Set up initial database credentials
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: news_db
    # Healthcheck Block
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d news_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      # Maps the internal 5432 port to your local machine (for checking data)
      - "5432:5432"
    volumes:
      # (Persistence) Saves the database data to a local folder named 'postgresdata'
      - postgresdata:/var/lib/postgresql/data

  # 2. ETL Application Container
  etl_app:
    # Build from local Dockerfile (uses requirements.txt with psycopg2)
    build: .
    container_name: de_etl_processor
    # Ensure the ETL waits for Postgres to be ready
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # CRITICAL Connection String
      POSTGRES_URL: postgresql://user:password@postgres:5432/news_db
      NEWS_API_KEY: ${NEWS_API_KEY} # Reads the API key from your .env file
    # Ensure the script runs only once and exits
    command: ["python", "etl.py"]


# Docker volumes for persistent storage
volumes:
  postgresdata: